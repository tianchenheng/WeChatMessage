name: 公众号定时推送

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # UTC 0点 = 北京时间 8点，可自行修改

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 执行推送
        run: python main.py
        env:
          APPID: ${{ secrets.APPID }}
          APPSECRET: ${{ secrets.APPSECRET }}
          TEMPLATE_ID: ${{ secrets.TEMPLATE_ID }}
          OPENID: ${{ secrets.OPENID }}
          WEATHER_KEY: ${{ secrets.WEATHER_KEY }}
